language: generic
sudo: required
services: docker
env:
  global:
    # The next declaration is the encrypted COVERITY_SCAN_TOKEN, created
    # via the "travis encrypt" command using the project repo's public key.
    - secure: "WvcrQ11lPioPZnUg2YUdoJV4gVaDsKUOBve8F4IVexEvD/YeuSg6sUw3CsU9DQwfSlI9BuD5y8kt0DaKrFU6x1kmRj1IJA8cT3bQOTyTIcfIYp3wCUpA7TSKGD/6DWWRRuPqOgCk39XqIohIdDdfgYXwhWoenvOmWZ0eh5CmaWg="
    - COVERITY_SCAN_SCRIPT_URL="https://scan.coverity.com/scripts/travisci_build_coverity_scan.sh"
    - COVERITY_SCAN_PROJECT_NAME="$TRAVIS_REPO_SLUG"
    - COVERITY_SCAN_BRANCH_PATTERN="coverity_scan"
    - COVERITY_SCAN_NOTIFICATION_EMAIL="guillem@debian.org"
    - COVERITY_SCAN_BUILD_COMMAND="make"
    - COVERITY_SCAN_BUILD_COMMAND_PREPEND="./autogen && ./configure"
    - CFLAGS="-fPIE"
    - LDFLAGS="-fPIE -pie"
before_install:
  - mkdir -p .travis/debian
  - cp -a debian/control .travis/debian/control
  - docker build -t debsig-verify/debian:buster .travis/
  - env | grep -E "TRAVIS|COV|FLAGS" >.travis/cov-env
script:
  - docker run --env-file .travis/cov-env
    -v `pwd`:/build debsig-verify/debian:buster
    sh -c "curl -s $COVERITY_SCAN_SCRIPT_URL | bash || true"
